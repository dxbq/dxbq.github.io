<!DOCTYPE html>
<html>
<head>
  <title>Siren Buttons</title>
</head>

<body style="text-align:center; font-family:Arial; background:#111; color:white;">

<h1>Siren Control</h1>

<button onclick="playLoop('wail')">WAIL</button>
<button onclick="playLoop('yelp')">YELP</button>
<button onclick="playLoop('t3')">T3</button>

<br><br>

<button 
  onmousedown="startManual()" 
  onmouseup="stopManual()" 
  onmouseleave="stopManual()"
  ontouchstart="startManual()" 
  ontouchend="stopManual()">
  MANUAL (HOLD)
</button>

<button 
  onmousedown="startHorn()" 
  onmouseup="stopHorn()" 
  onmouseleave="stopHorn()"
  ontouchstart="startHorn()" 
  ontouchend="stopHorn()">
  HORN (HOLD)
</button>

<br><br>

<button onclick="stopAll()">STOP</button>

<!-- Sounds -->
<audio id="wail" src="sounds/wail.mp3" loop></audio>
<audio id="yelp" src="sounds/yelp.mp3" loop></audio>
<audio id="t3" src="sounds/t3.mp3" loop></audio>
<audio id="manual" src="sounds/manual.mp3" loop></audio>
<audio id="horn" src="sounds/horn.mp3" loop></audio>

<script>
let modes = ["wail","yelp","t3"];
let manual = document.getElementById("manual");
let horn = document.getElementById("horn");

// stop sirens
function stopAll() {
  modes.forEach(id => {
    let s = document.getElementById(id);
    s.pause();
    s.currentTime = 0;
  });
  stopManual();
  stopHorn();
}

// play loop siren
function playLoop(id) {
  stopAll();
  let s = document.getElementById(id);
  s.play();
}

// manual hold
function startManual() {
  manual.currentTime = 0;
  manual.play();
}

function stopManual() {
  manual.pause();
  manual.currentTime = 0;
}

// horn hold
function startHorn() {
  horn.currentTime = 0;
  horn.play();
}

function stopHorn() {
  horn.pause();
  horn.currentTime = 0;
}
</script>

</body>
</html>
