<!DOCTYPE html>
<html>
<head>
  <title>Whelen HS3200 Siren</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
      overflow-x: hidden;
    }

    .lights {
      position: fixed;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      background: rgba(255, 0, 0, 0.18);
      pointer-events: none;
      opacity: 0;
    }

    .lights.right {
      left: 50%;
      background: rgba(0, 100, 255, 0.18);
    }

    .lights.active {
      animation: flash 0.35s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 0.15; }
      to { opacity: 0.45; }
    }

    h1 {
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .panel {
      margin-top: 40px;
      position: relative;
      z-index: 2;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 20px 40px;
      font-size: 18px;
      background: black;
      border: 2px solid #00ffcc;
      border-radius: 10px;
      color: #00ffcc;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #00ffcc;
      color: black;
      transform: scale(1.1);
    }

    .horn {
      border-color: red;
      color: red;
    }

    .horn:hover {
      background: red;
      color: black;
    }

    .manual {
      border-color: yellow;
      color: yellow;
    }

    .manual:hover {
      background: yellow;
      color: black;
    }

    .status {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      position: relative;
      z-index: 2;
    }
  </style>
</head>

<body>

<div id="redLight" class="lights"></div>
<div id="blueLight" class="lights right"></div>

<h1>🚓 Whelen HS3200 Siren Panel</h1>

<div class="panel">
  <button class="btn" onclick="playLoop('wail')">WAIL</button>
  <button class="btn" onclick="playLoop('yelp')">YELP</button>
  <button class="btn" onclick="playLoop('t3')">T3</button>

  <br>

  <button class="btn manual"
    onmousedown="startManual()"
    onmouseup="stopManual()"
    onmouseleave="stopManual()"
    ontouchstart="startManual()"
    ontouchend="stopManual()">
    MANUAL (HOLD)
  </button>

  <button class="btn horn"
    onmousedown="startHorn()"
    onmouseup="stopHorn()"
    onmouseleave="stopHorn()"
    ontouchstart="startHorn()"
    ontouchend="stopHorn()">
    HORN (HOLD)
  </button>

  <br>

  <button class="btn" onclick="stopAll()">STOP</button>
</div>

<div class="status" id="status">STANDBY</div>

<!-- Sirens -->
<audio id="wail" src="sounds/wail.mp3" loop></audio>
<audio id="yelp" src="sounds/yelp.mp3" loop></audio>
<audio id="t3" src="sounds/t3.mp3" loop></audio>

<!-- Hold sounds -->
<audio id="manual" src="sounds/manual.mp3" loop></audio>
<audio id="horn" src="sounds/horn.mp3" loop></audio>

<script>
let sounds = ["wail", "yelp", "t3"];
let manual = document.getElementById("manual");
let horn = document.getElementById("horn");
let statusText = document.getElementById("status");
let redLight = document.getElementById("redLight");
let blueLight = document.getElementById("blueLight");

function setStatus(text) {
  statusText.innerText = text;
}

function startLights() {
  redLight.classList.add("active");
  blueLight.classList.add("active");
}

function stopLights() {
  redLight.classList.remove("active");
  blueLight.classList.remove("active");
}

// Stop all sirens + hold sounds
function stopAll() {
  sounds.forEach(id => {
    let s = document.getElementById(id);
    s.pause();
    s.currentTime = 0;
  });

  manual.pause();
  manual.currentTime = 0;

  horn.pause();
  horn.currentTime = 0;

  stopLights();
  setStatus("STANDBY");
}

// Play siren loop
function playLoop(id) {
  stopAll();
  let sound = document.getElementById(id);
  sound.play();
  startLights();
  setStatus(id.toUpperCase());
}

// HOLD MANUAL
function startManual() {
  manual.currentTime = 0;
  manual.play();
  startLights();
  setStatus("MANUAL");
}

function stopManual() {
  manual.pause();
  manual.currentTime = 0;

  let activeMode = sounds.find(id => !document.getElementById(id).paused);
  if (activeMode) {
    setStatus(activeMode.toUpperCase());
    startLights();
  } else {
    horn.pause();
    horn.currentTime = 0;
    stopLights();
    setStatus("STANDBY");
  }
}

// HOLD HORN
function startHorn() {
  horn.currentTime = 0;
  horn.play();
  startLights();
  setStatus("HORN");
}

function stopHorn() {
  horn.pause();
  horn.currentTime = 0;

  let activeMode = sounds.find(id => !document.getElementById(id).paused);
  if (activeMode) {
    setStatus(activeMode.toUpperCase());
    startLights();
  } else if (!manual.paused) {
    setStatus("MANUAL");
    startLights();
  } else {
    stopLights();
    setStatus("STANDBY");
  }
}
</script>

</body>
</html>
