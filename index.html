<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whelen Controller Replica</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #d8d8d8;
      font-family: Arial, Helvetica, sans-serif;
      padding: 24px;
    }

    .unit {
      width: 980px;
      max-width: 100%;
      background:
        linear-gradient(180deg, #3d3d3d 0%, #242424 10%, #111 55%, #202020 100%);
      border-radius: 26px;
      padding: 24px 26px 22px;
      position: relative;
      box-shadow:
        0 18px 38px rgba(0,0,0,.35),
        inset 0 2px 8px rgba(255,255,255,.08),
        inset 0 -3px 8px rgba(0,0,0,.45);
    }

    .unit::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 20px;
      pointer-events: none;
      box-shadow:
        inset 0 2px 8px rgba(255,255,255,.05),
        inset 0 -2px 8px rgba(0,0,0,.3);
    }

    .top-shadow {
      position: absolute;
      inset: 0;
      border-radius: 26px;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% -30%, rgba(255,255,255,.18), transparent 38%),
        radial-gradient(circle at 50% 120%, rgba(0,0,0,.18), transparent 34%);
      mix-blend-mode: screen;
      opacity: .35;
    }

    .layout {
      display: grid;
      grid-template-columns: 305px 1fr;
      gap: 22px;
      position: relative;
      z-index: 1;
    }

    .left {
      padding-top: 6px;
    }

    .top-row {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .mid-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .bottom-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .btn {
      min-height: 62px;
      border: 2px solid #7c848d;
      border-radius: 7px;
      background:
        linear-gradient(180deg, #eef2f6 0%, #d8dde2 22%, #c8cdd3 52%, #afb5bc 100%);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.9),
        inset 0 -2px 3px rgba(0,0,0,.12),
        0 2px 0 rgba(0,0,0,.18);
      color: #42484e;
      font-weight: 700;
      font-size: 17px;
      cursor: pointer;
      padding: 6px 4px 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.05;
      letter-spacing: .2px;
      position: relative;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn.small {
      min-height: 58px;
      font-size: 14px;
      font-weight: 700;
    }

    .btn.bottom {
      min-height: 62px;
      font-size: 20px;
      font-weight: 900;
    }

    .tiny {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.05;
    }

    .tiny2 {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.05;
    }

    .icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      font-size: 12px;
    }

    .wave {
      font-size: 28px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -3px;
      transform: translateY(-2px);
    }

    .icon-mark {
      font-size: 26px;
      line-height: 1;
      transform: translateY(-1px);
    }

    .speaker-icon {
      width: 28px;
      height: 18px;
      position: relative;
    }

    .speaker-icon::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      width: 11px;
      height: 14px;
      background: #6c737c;
      clip-path: polygon(0 30%, 45% 30%, 78% 0, 78% 100%, 45% 70%, 0 70%);
      border-radius: 1px;
    }

    .speaker-icon::after {
      content: "";
      position: absolute;
      right: -1px;
      top: 2px;
      width: 14px;
      height: 14px;
      border-right: 3px solid #6c737c;
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      border-radius: 50%;
      transform: scaleX(1.2);
    }

    .logo {
      font-size: 58px;
      font-weight: 900;
      font-style: italic;
      color: #e23737;
      letter-spacing: -2px;
      line-height: 1;
      text-shadow:
        -2px -2px 0 #f4f4f4,
        2px -2px 0 #f4f4f4,
        -2px 2px 0 #f4f4f4,
        2px 2px 0 #f4f4f4,
        0 3px 0 rgba(0,0,0,.18);
      margin: 18px 0 18px 2px;
      width: fit-content;
    }

    .logo sup {
      font-size: 15px;
      color: #f4f4f4;
      text-shadow: none;
      margin-left: 2px;
      top: -1.2em;
      position: relative;
      font-style: normal;
    }

    .knob-area {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .knob {
      width: 88px;
      height: 40px;
      border-radius: 14px;
      background:
        linear-gradient(180deg, #141414, #272727 45%, #0d0d0d 100%);
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.08),
        inset 0 -2px 3px rgba(0,0,0,.55),
        0 2px 4px rgba(0,0,0,.3);
      position: relative;
    }

    .knob::before {
      content: "";
      position: absolute;
      width: 10px;
      height: 34px;
      left: 8px;
      top: 3px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, #3b3b3b, #121212);
      box-shadow:
        11px 0 0 #171717,
        22px 0 0 #2e2e2e,
        33px 0 0 #141414,
        44px 0 0 #303030,
        55px 0 0 #121212;
      opacity: .9;
    }

    .led-row {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-top: 6px;
    }

    .arrow-left,
    .arrow-right {
      width: 0;
      height: 0;
    }

    .arrow-left {
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-right: 14px solid #6f767e;
    }

    .arrow-right {
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 14px solid #6f767e;
    }

    .led {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #3a3a3a;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,.05),
        inset 0 -1px 2px rgba(0,0,0,.55);
    }

    .led.active {
      background: #d6d9dd;
      box-shadow: 0 0 10px rgba(255,255,255,.45);
    }

    .pressed {
      outline: 4px solid rgba(150,190,255,.35);
    }

    .screen {
      margin-top: 20px;
      width: 245px;
      min-height: 54px;
      border-radius: 12px;
      background: #0e1114;
      border: 1px solid #4d5660;
      color: #a7ffbd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      letter-spacing: 1px;
      font-size: 20px;
      box-shadow: inset 0 0 14px rgba(0,0,0,.75);
    }

    @media (max-width: 960px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .left {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .top-row {
        grid-template-columns: repeat(4, 1fr);
      }

      .mid-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .unit {
        padding: 18px;
      }

      .top-row {
        grid-template-columns: repeat(2, 1fr);
      }

      .mid-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .bottom-row {
        grid-template-columns: 1fr;
      }

      .logo {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="unit">
    <div class="top-shadow"></div>

    <div class="layout">
      <div class="left">
        <div class="logo">WHELEN<sup>®</sup></div>

        <div class="knob-area">
          <div class="knob"></div>
        </div>

        <div class="led-row">
          <div class="arrow-left"></div>
          <div class="led" id="led1"></div>
          <div class="led" id="led2"></div>
          <div class="led" id="led3"></div>
          <div class="led" id="led4"></div>
          <div class="led" id="led5"></div>
          <div class="led" id="led6"></div>
          <div class="arrow-right"></div>
        </div>

        <div class="screen" id="screen">STAND BY</div>
      </div>

      <div class="right">
        <div class="top-row">
          <button class="btn small" data-name="standby" onclick="stopAll(true)">STAND<br>BY</button>

          <button class="btn small" data-name="radio" onclick="setMode('radio', this)">
            <div class="icon">
              <div class="tiny">(((↯)))</div>
              <div>RAD</div>
            </div>
          </button>

          <button class="btn small" data-name="hf" onclick="setMode('hf', this)">
            <div class="icon">
              <div class="icon-mark">☢</div>
              <div>HF</div>
            </div>
          </button>

          <button class="btn small" data-name="wail" onclick="setMode('wail', this)">
            <div class="icon">
              <div class="wave">∿∿</div>
              <div>WAIL</div>
            </div>
          </button>

          <button class="btn small" data-name="yelp" onclick="setMode('yelp', this)">
            <div class="icon">
              <div class="wave" style="letter-spacing:-4px;">∿∿∿</div>
              <div>YELP</div>
            </div>
          </button>

          <button class="btn small" data-name="t3" onclick="setMode('t3', this)">T3</button>

          <button class="btn small" data-name="manhold"
            onmousedown="startManual(this)"
            onmouseup="stopManual()"
            onmouseleave="stopManual()"
            ontouchstart="startManual(this, event)"
            ontouchend="stopManual(event)">
            <div class="icon">
              <div class="icon-mark">☞</div>
              <div>MAN</div>
            </div>
          </button>

          <button class="btn small" data-name="horn"
            onmousedown="startHorn(this)"
            onmouseup="stopHorn()"
            onmouseleave="stopHorn()"
            ontouchstart="startHorn(this, event)"
            ontouchend="stopHorn(event)">
            <div class="icon">
              <div class="icon-mark">📯</div>
              <div>HORN</div>
            </div>
          </button>
        </div>

        <div class="mid-grid">
          <button class="btn small" onclick="flashTemp('left')">
            <div class="speaker-icon"></div>
          </button>

          <button class="btn small" onclick="flashTemp('center1')">
            <div class="speaker-icon" style="transform:scaleX(1.15)"></div>
          </button>

          <button class="btn small" onclick="flashTemp('center2')">
            <div class="speaker-icon" style="transform:scaleX(1.3)"></div>
          </button>

          <button class="btn small" onclick="flashTemp('tdflash')">TD<br>FLASH</button>
          <button class="btn small" onclick="flashTemp('scene')">SCENE</button>

          <button class="btn small" onclick="flashTemp('tracerleft')">TRACER<br>LEFT</button>
          <button class="btn small" onclick="flashTemp('tracerrear')">TRACER<br>REAR</button>
          <button class="btn small" onclick="flashTemp('inneredge')">INNER<br>EDGE</button>
          <button class="btn small" onclick="flashTemp('tailcut')">TAIL<br>CUT</button>
          <button class="btn small" onclick="flashTemp('override')">OVER<br>RIDE</button>
        </div>

        <div class="bottom-row">
          <button class="btn bottom" onclick="flashTemp('leftarrow')">⬅</button>
          <button class="btn bottom" onclick="flashTemp('rightarrow')">➡</button>
          <button class="btn bottom" onclick="flashTemp('flash')">FLASH</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="radio" src="sounds/radio.mp3" loop preload="auto"></audio>
  <audio id="hf" src="sounds/hf.mp3" loop preload="auto"></audio>
  <audio id="wail" src="sounds/wail.mp3" loop preload="auto"></audio>
  <audio id="yelp" src="sounds/yelp.mp3" loop preload="auto"></audio>
  <audio id="t3" src="sounds/t3.mp3" loop preload="auto"></audio>
  <audio id="manual" src="sounds/manual.mp3" loop preload="auto"></audio>
  <audio id="horn" src="sounds/horn.mp3" loop preload="auto"></audio>

  <script>
    const modeIds = ["radio", "hf", "wail", "yelp", "t3"];
    const audioMap = {};
    modeIds.forEach(id => audioMap[id] = document.getElementById(id));

    const manual = document.getElementById("manual");
    const horn = document.getElementById("horn");
    const screen = document.getElementById("screen");
    const leds = [
      document.getElementById("led1"),
      document.getElementById("led2"),
      document.getElementById("led3"),
      document.getElementById("led4"),
      document.getElementById("led5"),
      document.getElementById("led6")
    ];

    let currentMode = null;
    let activeButton = null;
    let hornActive = false;
    let manualActive = false;

    function clearPressed() {
      document.querySelectorAll(".btn").forEach(btn => btn.classList.remove("pressed"));
    }

    function clearLeds() {
      leds.forEach(led => led.classList.remove("active"));
    }

    function setLedPattern(mode) {
      clearLeds();

      if (mode === "radio") leds[0].classList.add("active");
      if (mode === "hf") leds[0].classList.add("active"), leds[1].classList.add("active");
      if (mode === "wail") leds[1].classList.add("active"), leds[2].classList.add("active");
      if (mode === "yelp") leds[2].classList.add("active"), leds[3].classList.add("active");
      if (mode === "t3") leds[3].classList.add("active"), leds[4].classList.add("active");
    }

    function stopPrimary() {
      modeIds.forEach(id => {
        audioMap[id].pause();
        audioMap[id].currentTime = 0;
      });
    }

    function setScreen(text) {
      screen.textContent = text;
    }

    function setMode(mode, buttonEl) {
      stopPrimary();
      currentMode = mode;
      if (audioMap[mode]) {
        audioMap[mode].currentTime = 0;
        audioMap[mode].play().catch(() => {});
      }

      clearPressed();
      if (buttonEl) {
        buttonEl.classList.add("pressed");
        activeButton = buttonEl;
      }

      setLedPattern(mode);
      setScreen(mode.toUpperCase());
    }

    function stopAll() {
      stopPrimary();
      stopHorn();
      stopManual();
      currentMode = null;
      activeButton = null;
      clearPressed();
      clearLeds();
      setScreen("STAND BY");
    }

    function startHorn(buttonEl, e) {
      if (e) e.preventDefault();
      hornActive = true;
      clearPressed();
      if (buttonEl) buttonEl.classList.add("pressed");
      horn.currentTime = 0;
      horn.play().catch(() => {});
      setScreen("HORN");
      leds[5].classList.add("active");
    }

    function stopHorn(e) {
      if (e) e.preventDefault();
      hornActive = false;
      horn.pause();
      horn.currentTime = 0;
      leds[5].classList.remove("active");

      clearPressed();
      if (activeButton) activeButton.classList.add("pressed");

      if (manualActive) {
        setScreen("MAN");
      } else if (currentMode) {
        setScreen(currentMode.toUpperCase());
      } else {
        setScreen("STAND BY");
      }
    }

    function startManual(buttonEl, e) {
      if (e) e.preventDefault();
      manualActive = true;
      clearPressed();
      if (buttonEl) buttonEl.classList.add("pressed");
      manual.currentTime = 0;
      manual.play().catch(() => {});
      setScreen("MAN");
      leds[4].classList.add("active");
    }

    function stopManual(e) {
      if (e) e.preventDefault();
      manualActive = false;
      manual.pause();
      manual.currentTime = 0;
      leds[4].classList.remove("active");

      clearPressed();
      if (activeButton) activeButton.classList.add("pressed");

      if (hornActive) {
        setScreen("HORN");
      } else if (currentMode) {
        setScreen(currentMode.toUpperCase());
      } else {
        setScreen("STAND BY");
      }
    }

    function flashTemp(name) {
      setScreen(name.toUpperCase());
      const i = Math.floor(Math.random() * leds.length);
      leds[i].classList.add("active");
      setTimeout(() => {
        if (!currentMode) clearLeds();
        else setLedPattern(currentMode);
      }, 180);
    }
  </script>
</body>
</html>
