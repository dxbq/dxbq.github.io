<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Siren Mobile</title>

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
      overflow: hidden;
    }

    .lights {
      position: fixed;
      top: 0;
      width: 50%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
    }

    .red { left: 0; background: rgba(255,0,0,0.25); }
    .blue { right: 0; background: rgba(0,100,255,0.25); }

    .active {
      animation: flash 0.3s infinite alternate;
    }

    @keyframes flash {
      from { opacity: 0.2; }
      to { opacity: 0.6; }
    }

    h1 {
      margin: 10px;
      font-size: 22px;
    }

    .panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .btn {
      padding: 25px;
      font-size: 18px;
      border-radius: 15px;
      border: 2px solid #00ffcc;
      background: black;
      color: #00ffcc;
      touch-action: manipulation;
    }

    .horn { border-color: red; color: red; }
    .manual { border-color: yellow; color: yellow; }

    .stop {
      grid-column: span 2;
      border-color: white;
      color: white;
    }

    .status {
      margin: 10px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div id="red" class="lights red"></div>
<div id="blue" class="lights blue"></div>

<h1>🚓 Siren Control</h1>

<div class="panel">
  <button class="btn" onclick="play('wail')">WAIL</button>
  <button class="btn" onclick="play('yelp')">YELP</button>

  <button class="btn" onclick="play('t3')">T3</button>

  <button class="btn manual"
    ontouchstart="startManual(event)"
    ontouchend="stopManual()">
    MANUAL
  </button>

  <button class="btn horn"
    ontouchstart="startHorn(event)"
    ontouchend="stopHorn()">
    HORN
  </button>

  <button class="btn stop" onclick="stopAll()">STOP</button>
</div>

<div class="status" id="status">STANDBY</div>

<!-- Sounds -->
<audio id="wail" src="sounds/wail.mp3" loop></audio>
<audio id="yelp" src="sounds/yelp.mp3" loop></audio>
<audio id="t3" src="sounds/t3.mp3" loop></audio>
<audio id="manual" src="sounds/manual.mp3" loop></audio>
<audio id="horn" src="sounds/horn.mp3" loop></audio>

<script>
let modes = ["wail","yelp","t3"];
let status = document.getElementById("status");
let red = document.getElementById("red");
let blue = document.getElementById("blue");

function lights(on){
  red.classList.toggle("active", on);
  blue.classList.toggle("active", on);
}

function setStatus(t){ status.innerText = t; }

function stopAll(){
  modes.forEach(id=>{
    let s=document.getElementById(id);
    s.pause(); s.currentTime=0;
  });
  stopManual();
  stopHorn();
  lights(false);
  setStatus("STANDBY");
}

function play(id){
  stopAll();
  document.getElementById(id).play();
  lights(true);
  setStatus(id.toUpperCase());
}

// MANUAL
function startManual(e){
  e.preventDefault();
  let m=document.getElementById("manual");
  m.currentTime=0; m.play();
  lights(true);
  setStatus("MANUAL");
}
function stopManual(){
  let m=document.getElementById("manual");
  m.pause(); m.currentTime=0;
}

// HORN
function startHorn(e){
  e.preventDefault();
  let h=document.getElementById("horn");
  h.currentTime=0; h.play();
  lights(true);
  setStatus("HORN");
}
function stopHorn(){
  let h=document.getElementById("horn");
  h.pause(); h.currentTime=0;
}
</script>

</body>
</html>
